# Source: vcs-facade/templates/bitbucket-db/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcs-facade-bitbucket-db
  namespace: "test-env"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcs-facade-bitbucket-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcs-facade-bitbucket-db
    spec:
      containers:
        - name: vcs-facade-bitbucket-db
          securityContext: {}
          image: docker.artifactory.openwaygroup.com/postgres:13-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5432
              hostPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "bitbucket"
            - name: POSTGRES_PASSWORD
              value: "bitbucket"
            - name: POSTGRES_USER
              value: "bitbucket"
          volumeMounts:
            - name: test-env-bitbucket-db-storage
              mountPath: /var/lib/postgresql/
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U bitbucket
            initialDelaySeconds: 90
          resources: {}
      volumes:
        - name: test-env-bitbucket-db-storage
          persistentVolumeClaim:
            claimName: test-env-bitbucket-db-storage
