# Source: vcs-facade/templates/bitbucket/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcs-facade-bitbucket
  namespace: "test-env"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcs-facade-bitbucket
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcs-facade-bitbucket
    spec:
      containers:
        - name: vcs-facade-ft-bitbucket
          securityContext: {}
          image: docker.artifactory.openwaygroup.com/atlassian/bitbucket-server:8.14.0-jdk11
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 7999
              hostPort: 7999    
              protocol: TCP
            - name: http
              containerPort: 7990
              hostPort: 7990
              protocol: TCP
          env:
            - name: JVM_MINIMUM_MEMORY
              value: "4096m"
            - name: JVM_MAXIMUM_MEMORY
              value: "4096m"
            - name: BITBUCKET_TICKETS_MIN
              value: "3"
            - name: JDBC_DRIVER
              value: "org.postgresql.Driver"
            - name: JDBC_PASSWORD
              value: "bitbucket"
            - name: JDBC_URL
              value: "jdbc:postgresql://vcs-facade-bitbucket-db-pod:5432/bitbucket"
#              value: "jdbc:postgresql://vcs-facade-bitbucket-db.test-env.svc.cluster.local:5432/bitbucket"
            - name: JDBC_USER
              value: "bitbucket"
            - name: SETUP_BASEURL
              value: "http://localhost:7990"
            - name: SETUP_DISPLAYNAME
              value: "Bitbucket"
            - name: SETUP_LICENSE
              value: ""
            - name: SETUP_SYSADMIN_DISPLAYNAME
              value: "Dev Instance Admin"
            - name: SETUP_SYSADMIN_EMAILADDRESS
              value: "admin@domain.corp"
            - name: SETUP_SYSADMIN_PASSWORD
              value: "admin"
            - name: SETUP_SYSADMIN_USERNAME
              value: "admin"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  if curl -s http://localhost:7990/status | grep -q '"state":"RUNNING"'; then
                  exit 0
                  else
                  exit 1
                  fi
            initialDelaySeconds: 120
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  if curl -s http://localhost:7990/status | grep -q '"state":"RUNNING"'; then
                  exit 0
                  else
                  exit 1
                  fi
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources: {}
          volumeMounts:
            - name: test-env-bitbucket-volume
              mountPath: /var/atlassian/application-data/bitbucket
      volumes:
        - name: test-env-bitbucket-volume
          hostPath:
            path: /Users/ozonophore/Projects/octopus-vcs-facade/deploy/bitbucket
            type: Directory
