# Source: vcs-facade/templates/vcs-facade/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcs-facade-vcs-facade
  namespace: "test-env"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcs-facade
      app.kubernetes.io/instance: vcs-facade
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcs-facade
        app.kubernetes.io/instance: vcs-facade
    spec:
      containers:
        - name: vcs-facade-vcs-facade
          securityContext: {}
          image: docker.artifactory.openwaygroup.com/octopusden/vcs-facade:3.0.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080    
              protocol: TCP
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "/app/config/"
            - name: SPRING_PROFILES_ACTIVE
              value: "ft,bitbucket"
          resources: {}
          volumeMounts:
            - name: test-env-application-bitbucket-config
              mountPath: /app/config/application-bitbucket.yml
              readOnly: true
            - name: test-env-application-ft-config
              mountPath: /app/config/application-ft.yml
              readOnly: true
            - name: test-env-bootstrap-ft-config
              mountPath: /app/config/bootstrap-ft.yml
              readOnly: true

      volumes:
        - hostPath:
            path: /Users/ozonophore/Projects/octopus-vcs-facade/deploy/chart/files/application-bitbucket.yml
            type: File
          name: test-env-application-bitbucket-config
        - hostPath:
            path: /Users/ozonophore/Projects/octopus-vcs-facade/deploy/chart/files/application-ft.yml
            type: File
          name: test-env-application-ft-config
        - hostPath:
            path: /Users/ozonophore/Projects/octopus-vcs-facade/deploy/chart/files/bootstrap-ft.yml
            type: File
          name: test-env-bootstrap-ft-config
